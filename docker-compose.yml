services:
  reelsort:
    image: reelsort:test
    build:
      context: .
      dockerfile: Dockerfile
    container_name: reelsort
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=production
      - PORT=4000
    volumes:
      - reelsort-data:/app/server/data
      - ./sample:/media
    restart: unless-stopped

volumes:
  reelsort-data:
